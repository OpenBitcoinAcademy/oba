  [[lessons.sections]]
  type = "code"
  language = "bitcoin"
  content = """
# P2PKH address (starts with 1)
pub_key_hash  = RIPEMD160(SHA256(compressed_pubkey))
versioned     = 0x00 || pub_key_hash
checksum      = SHA256(SHA256(versioned))[:4]
address       = Base58(versioned || checksum)

# P2SH-P2WPKH address (starts with 3)
witness_prog  = 0x00 0x14 || pub_key_hash
script_hash   = RIPEMD160(SHA256(witness_prog))
address       = Base58Check(0x05 || script_hash)

# P2WPKH address (starts with bc1q)
address       = Bech32("bc", 0x00, pub_key_hash)

# P2TR address (starts with bc1p)
address       = Bech32m("bc", 0x01, tweaked_pubkey_x)
"""

  [[lessons.sections]]
  type = "callout"
  style = "tip"

