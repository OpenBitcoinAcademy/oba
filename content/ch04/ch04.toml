  [[lessons.sections]]
  type = "code"
  language = "bitcoin"
  content = """
# Key generation (secp256k1)

private_key   = random 256-bit integer k, where 1 < k < n
                n = FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141

public_key    = k * G    (point multiplication on the curve)

# Compressed public key: 33 bytes
prefix        = 02 if y is even, 03 if y is odd
compressed    = prefix || x

# Uncompressed public key: 65 bytes
uncompressed  = 04 || x || y

# Wallet Import Format (WIF)
wif           = Base58Check(0x80 || private_key || 0x01)
                0x80 = mainnet, 0x01 = compressed flag
"""

