  [[lessons.sections]]
  type = "code"
  language = "bitcoin"
  content = """
# Field sizes
version       4 bytes   little-endian
input count   varint    1-9 bytes
  prev_txid   32 bytes  reversed byte order
  prev_index  4 bytes   little-endian
  script_len  varint
  script_sig  variable
  sequence    4 bytes
output count  varint
  value       8 bytes   little-endian (satoshis)
  script_len  varint
  script_pk   variable
locktime      4 bytes   little-endian
"""

