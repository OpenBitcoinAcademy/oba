  [[lessons.sections]]
  type = "code"
  language = "bitcoin"
  content = """
# Transaction structure

version       = 02000000

# Inputs: which coins to spend
input_count   = 01
  prev_txid   = <32 bytes, reversed>
  prev_index  = 00000000
  script_sig  = <signature> <public_key>
  sequence    = ffffffff

# Outputs: where coins go
output_count  = 02
  value       = 905f010000000000    (90000 sats, little-endian)
  script_pk   = OP_DUP OP_HASH160 <pub_key_hash> OP_EQUALVERIFY OP_CHECKSIG
  value       = 204e000000000000    (change output)
  script_pk   = <change script>

locktime      = 00000000

txid          = SHA256(SHA256(serialized_tx)), reversed
"""

  [[lessons.sections]]
  type = "callout"
  style = "warning"

  [[lessons.sections]]
  type = "quiz"
  correct = [0, 2]

