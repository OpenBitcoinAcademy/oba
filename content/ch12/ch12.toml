  [[lessons.sections]]
  type = "code"
  language = "bitcoin"
  content = """
# Mining: find a nonce that produces a hash below the target

target        = 00ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff

loop:
  header.nonce += 1
  hash = SHA256(SHA256(header))
  if hash < target:
    block found

# Lower target = harder. Current blocks (~#939,000) have targets
# so low that valid hashes start with 20-21 hex zeros.
"""

