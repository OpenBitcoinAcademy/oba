name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Gio dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc pkg-config \
            libwayland-dev libx11-dev libx11-xcb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libffi-dev libvulkan-dev \
            libxcursor-dev libxfixes-dev
      - name: Test
        run: go test -coverprofile=coverage.out ./...
      - name: Check coverage
        run: go tool cover -func=coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...

  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate translations
        run: go run ./tools/translate-check/...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]
        include:
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Gio dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc pkg-config \
            libwayland-dev libx11-dev libx11-xcb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libffi-dev libvulkan-dev \
            libxcursor-dev libxfixes-dev
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o oba-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/oba
