<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Bitcoin Academy</title>
    <link rel="icon" href="app/appicon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #181C46;
            --navy-light: #1F2350;
            --orange: #F7931A;
            --orange-glow: rgba(247, 147, 26, 0.15);
            --text: #E8E8EC;
            --text-muted: #8A8DA0;
            --surface: #1F2350;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--navy);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(24, 28, 70, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(247, 147, 26, 0.1);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text);
        }
        .nav-brand img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        .nav-brand span {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--orange); }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem 4rem;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 0 0 60px rgba(247, 147, 26, 0.2);
        }
        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            line-height: 1.1;
        }
        .hero h1 .accent { color: var(--orange); }
        .hero .tagline {
            font-size: clamp(1.1rem, 2vw, 1.35rem);
            color: var(--text-muted);
            max-width: 580px;
            margin-bottom: 2.5rem;
        }
        .hero-cta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--orange);
            color: var(--navy);
        }
        .btn-primary:hover {
            background: #ffA333;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(247, 147, 26, 0.3);
        }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        /* Demo section */
        .demo-section {
            text-align: center;
            padding: 5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .demo-container {
            position: relative;
            display: inline-block;
            margin-top: 2rem;
        }

        /* Phone frame */
        .phone-frame {
            width: 380px;
            height: 780px;
            background: #0a0a0a;
            border-radius: 48px;
            border: 4px solid #2a2a2a;
            padding: 16px;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 24px 80px rgba(0,0,0,0.5),
                0 0 120px rgba(247, 147, 26, 0.08);
        }
        .phone-notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #0a0a0a;
            border-radius: 20px;
            z-index: 10;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 34px;
            overflow: hidden;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Splash state (before demo starts) */
        .demo-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            height: 100%;
            transition: opacity 0.3s;
        }
        .demo-splash img {
            width: 96px;
            height: 96px;
            border-radius: 22px;
        }
        .demo-splash h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .demo-splash .btn-start {
            padding: 0.75rem 2rem;
            background: var(--orange);
            color: var(--navy);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .demo-splash .btn-start:hover {
            background: #ffa333;
            transform: scale(1.03);
        }

        /* WASM iframe */
        .demo-iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 34px;
        }
        .demo-iframe.active {
            display: block;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        footer a {
            color: var(--orange);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
        .footer-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        /* Loading spinner */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--surface);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 640px) {
            nav { padding: 0.75rem 1rem; }
            .nav-links { display: none; }
            .hero { padding: 5rem 1.5rem 3rem; }
            .hero-icon { width: 90px; height: 90px; border-radius: 22px; }
            .demo-section { padding: 2rem 1rem; }
            .phone-frame {
                width: 280px;
                height: 580px;
                border-radius: 36px;
                padding: 10px;
            }
            .phone-notch { width: 90px; height: 22px; top: 8px; }
            .phone-screen { border-radius: 26px; }
            .demo-iframe { border-radius: 26px; }

        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-brand">
        <img src="app/appicon.png" alt="OBA">
        <span>Open Bitcoin Academy</span>
    </a>
    <ul class="nav-links">
        <li><a href="#demo">Try It</a></li>
        <li><a href="https://gitworkshop.dev/r/naddr1qqpk7cnpqgsqyuv5s2cu3626dhxydzhjc7lakmqg2hdurwnfyz7kh33qrc6sqysrqsqqqauednhay6">Source</a></li>
    </ul>
</nav>

<div class="hero">
    <img src="app/appicon.png" alt="Open Bitcoin Academy" class="hero-icon">
    <h1>Learn Bitcoin.<br><span class="accent">Build understanding.</span></h1>
    <p class="tagline">Work in progress.</p>
    <div class="hero-cta">
        <a href="#demo" class="btn btn-primary">Try it now</a>
        <a href="https://gitworkshop.dev/r/naddr1qqpk7cnpqgsqyuv5s2cu3626dhxydzhjc7lakmqg2hdurwnfyz7kh33qrc6sqysrqsqqqauednhay6" class="btn btn-secondary">View Source</a>
    </div>
</div>

<div class="demo-section" id="demo">
    <div class="demo-container">
        <div class="phone-frame">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div class="demo-splash" id="demoSplash">
                    <img src="app/appicon.png" alt="OBA">
                    <h3>Open Bitcoin Academy</h3>
                    <button class="btn-start" onclick="startDemo()">Start</button>
                </div>
                <div class="loading" id="demoLoading">
                    <div class="spinner"></div>
                    Loading app (18 MB)...
                </div>
                <iframe class="demo-iframe" id="demoFrame" src="about:blank"></iframe>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-links">
        <a href="https://codeberg.org/OpenBitcoinAcademy/oba">Codeberg</a>
        <a href="https://github.com/OpenBitcoinAcademy/oba">GitHub</a>
        <a href="https://gitworkshop.dev/r/naddr1qqpk7cnpqgsqyuv5s2cu3626dhxydzhjc7lakmqg2hdurwnfyz7kh33qrc6sqysrqsqqqauednhay6">Nostr</a>
    </div>
    <p>Public domain. No rights reserved.</p>
</footer>

<script>
function startDemo() {
    var splash = document.getElementById('demoSplash');
    var loading = document.getElementById('demoLoading');
    var frame = document.getElementById('demoFrame');

    splash.style.display = 'none';
    loading.style.display = 'flex';

    frame.src = 'app/index.html';
    frame.onload = function() {
        loading.style.display = 'none';
        frame.classList.add('active');
    };
}

// Smooth scroll for anchor links
document.querySelectorAll('a[href^="#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.querySelector(this.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
});
</script>

</body>
</html>
